reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "js/components/**"
      instructions: "Flag any use of innerHTML with dynamic/API data — all user-facing content must use DOM APIs (textContent, createElement) to prevent XSS. Static hardcoded HTML in innerHTML is acceptable."
    - path: "js/services/**"
      instructions: "Check that API calls go through the central api.js helpers. Flag any direct fetch() calls or hardcoded base URLs."
    - path: "js/pages/**"
      instructions: "Pages should fetch data and pass it to components — not render HTML directly. Check that errors are caught and handled gracefully with a fallback."
    - path: "js/router.js"
      instructions: "Check that new routes are registered and that anchor routes (in-page scroll) are handled correctly. Flag any routes that re-render unnecessarily."
    - path: "css/**"
      instructions: "Check that new styles use the existing CSS custom properties (tokens) from :root rather than hardcoded values. Flag missing focus-visible states on interactive elements."
